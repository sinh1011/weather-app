<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; margin-bottom: 24px; font-size: 28px; }
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    .search-box input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 16px;
      outline: none;
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.6); }
    .search-box button {
      padding: 12px 20px;
      background: #e94560;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.3s;
    }
    .search-box button:hover { background: #c73652; }
    .weather-info { text-align: center; display: none; }
    .weather-icon { font-size: 80px; margin-bottom: 10px; }
    .temperature { font-size: 60px; font-weight: bold; }
    .city-name { font-size: 24px; margin: 8px 0; opacity: 0.9; }
    .description { font-size: 18px; opacity: 0.75; text-transform: capitalize; margin-bottom: 24px; }
    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .detail-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
    }
    .detail-card .label { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
    .detail-card .value { font-size: 18px; font-weight: bold; }
    .error-msg {
      text-align: center;
      color: #e94560;
      font-size: 16px;
      display: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#127777;&#65039; Weather App</h1>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Nh&#7853;p t&#234;n th&#224;nh ph&#7889;..." />
      <button onclick="getWeather()">&#128269;</button>
    </div>
    <div class="weather-info" id="weatherInfo">
      <div class="weather-icon" id="weatherIcon"></div>
      <div class="temperature" id="temp"></div>
      <div class="city-name" id="cityName"></div>
      <div class="description" id="description"></div>
      <div class="details">
        <div class="detail-card">
          <div class="label">&#128167; &#272;&#7897; &#7849;m</div>
          <div class="value" id="humidity"></div>
        </div>
        <div class="detail-card">
          <div class="label">&#127788; Gi&#243;</div>
          <div class="value" id="wind"></div>
        </div>
        <div class="detail-card">
          <div class="label">&#127797;&#65039; C&#7843;m gi&#225;c</div>
          <div class="value" id="feelsLike"></div>
        </div>
        <div class="detail-card">
          <div class="label">&#128065;&#65039; T&#7847;m nh&#236;n</div>
          <div class="value" id="visibility"></div>
        </div>
      </div>
    </div>
    <div class="error-msg" id="errorMsg">Kh&#244;ng t&#236;m th&#7845;y th&#224;nh ph&#7889;!</div>
  </div>

  <script>
    const API_KEY = 'YOUR_API_KEY_HERE';

    const weatherIcons = {
      Clear: '&#9728;&#65039;',
      Clouds: '&#9925;',
      Rain: '&#127783;&#65039;',
      Drizzle: '&#127746;',
      Thunderstorm: '&#9928;&#65039;',
      Snow: '&#10052;&#65039;',
      Mist: '&#127787;&#65039;',
      Fog: '&#127787;&#65039;',
    };

    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) return;

      const info = document.getElementById('weatherInfo');
      const errorMsg = document.getElementById('errorMsg');
      info.style.display = 'none';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=vi`
        );
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();

        document.getElementById('weatherIcon').innerHTML =
          weatherIcons[data.weather[0].main] || '&#127760;';
        document.getElementById('temp').textContent = Math.round(data.main.temp) + '\u00b0C';
        document.getElementById('cityName').textContent = `${data.name}, ${data.sys.country}`;
        document.getElementById('description').textContent = data.weather[0].description;
        document.getElementById('humidity').textContent = data.main.humidity + '%';
        document.getElementById('wind').textContent = Math.round(data.wind.speed * 3.6) + ' km/h';
        document.getElementById('feelsLike').textContent = Math.round(data.main.feels_like) + '\u00b0C';
        document.getElementById('visibility').textContent = (data.visibility / 1000).toFixed(1) + ' km';

        info.style.display = 'block';
      } catch {
        errorMsg.style.display = 'block';
      }
    }

    document.getElementById('cityInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') getWeather();
    });
  </script>
</body>
</html>
